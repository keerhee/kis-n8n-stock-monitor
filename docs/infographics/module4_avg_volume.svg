<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="평균 거래량 계산 흐름">
  <defs>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a04777"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1a2332">
    20일 평균 거래량 계산 흐름
  </text>

  <!-- Step 1: 기간별 시세 호출 -->
  <g font-family="system-ui">
    <rect x="40" y="70" width="200" height="80" rx="10" fill="#fff" stroke="#7a3a8a" stroke-width="2"/>
    <text x="140" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#7a3a8a">📡 기간별 시세 API</text>
    <text x="140" y="118" text-anchor="middle" font-size="11" fill="#5a6a7a">/inquire-daily-itemchartprice</text>
    <text x="140" y="134" text-anchor="middle" font-size="11" fill="#5a6a7a">최근 20영업일 요청</text>
  </g>

  <line x1="240" y1="110" x2="280" y2="110" stroke="#a04777" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Step 2: 응답 배열 -->
  <g font-family="system-ui">
    <rect x="280" y="60" width="240" height="100" rx="10" fill="#f7f9fc" stroke="#e3e8ef"/>
    <text x="400" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">output2[] 일별 데이터</text>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#5a6a7a">
      <text x="295" y="100">[</text>
      <text x="295" y="115">  { stck_bsop_date: 20260502, acml_vol: 9876543 },</text>
      <text x="295" y="128">  { stck_bsop_date: 20260501, acml_vol: 8765432 },</text>
      <text x="295" y="141">  ... 18개 더 ...</text>
      <text x="295" y="154">]</text>
    </g>
  </g>

  <line x1="520" y1="110" x2="560" y2="110" stroke="#a04777" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Step 3: Code 노드 -->
  <g font-family="system-ui">
    <rect x="560" y="70" width="200" height="80" rx="10" fill="#fff" stroke="#a04777" stroke-width="2"/>
    <text x="660" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#a04777">🧮 Code 노드 (JS)</text>
    <text x="660" y="118" text-anchor="middle" font-size="11" fill="#5a6a7a">map → reduce → /20</text>
    <text x="660" y="134" text-anchor="middle" font-size="11" fill="#5a6a7a">→ avg_volume</text>
  </g>

  <!-- 코드 예시 -->
  <g font-family="system-ui">
    <rect x="40" y="200" width="720" height="120" rx="10" fill="#0f172a"/>
    <text x="60" y="226" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">// n8n Code 노드 — 평균 거래량 계산</text>
    <text x="60" y="248" font-family="JetBrains Mono, monospace" font-size="12" fill="#e2e8f0">const days = $input.first().json.output2;</text>
    <text x="60" y="268" font-family="JetBrains Mono, monospace" font-size="12" fill="#e2e8f0">const volumes = days.map(d =&gt; Number(d.acml_vol));</text>
    <text x="60" y="288" font-family="JetBrains Mono, monospace" font-size="12" fill="#e2e8f0">const avg = volumes.reduce((a, b) =&gt; a + b, 0) / volumes.length;</text>
    <text x="60" y="308" font-family="JetBrains Mono, monospace" font-size="12" fill="#fbbf24">return [{ json: { avg_volume: Math.round(avg) } }];</text>
  </g>

  <!-- 시각화 막대그래프 -->
  <g font-family="system-ui">
    <text x="400" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">최근 20일 거래량 시각화</text>
    <g transform="translate(60, 360)">
      <rect x="0"   y="20" width="20" height="30" fill="#a04777" opacity="0.7"/>
      <rect x="25"  y="15" width="20" height="35" fill="#a04777" opacity="0.7"/>
      <rect x="50"  y="25" width="20" height="25" fill="#a04777" opacity="0.7"/>
      <rect x="75"  y="10" width="20" height="40" fill="#a04777" opacity="0.7"/>
      <rect x="100" y="22" width="20" height="28" fill="#a04777" opacity="0.7"/>
      <rect x="125" y="18" width="20" height="32" fill="#a04777" opacity="0.7"/>
      <rect x="150" y="8"  width="20" height="42" fill="#a04777" opacity="0.7"/>
      <rect x="175" y="20" width="20" height="30" fill="#a04777" opacity="0.7"/>
      <rect x="200" y="14" width="20" height="36" fill="#a04777" opacity="0.7"/>
      <rect x="225" y="22" width="20" height="28" fill="#a04777" opacity="0.7"/>
      <rect x="250" y="16" width="20" height="34" fill="#a04777" opacity="0.7"/>
      <rect x="275" y="24" width="20" height="26" fill="#a04777" opacity="0.7"/>
      <rect x="300" y="12" width="20" height="38" fill="#a04777" opacity="0.7"/>
      <rect x="325" y="20" width="20" height="30" fill="#a04777" opacity="0.7"/>
      <rect x="350" y="6"  width="20" height="44" fill="#a04777" opacity="0.7"/>
      <rect x="375" y="22" width="20" height="28" fill="#a04777" opacity="0.7"/>
      <rect x="400" y="18" width="20" height="32" fill="#a04777" opacity="0.7"/>
      <rect x="425" y="14" width="20" height="36" fill="#a04777" opacity="0.7"/>
      <rect x="450" y="24" width="20" height="26" fill="#a04777" opacity="0.7"/>
      <rect x="475" y="16" width="20" height="34" fill="#a04777" opacity="0.7"/>
      <line x1="-10" y1="22" x2="510" y2="22" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4"/>
      <text x="525" y="26" font-size="11" font-weight="700" fill="#10b981">평균</text>
    </g>
  </g>
</svg>
