<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="학습 로드맵">
  <defs>
    <linearGradient id="grad-roadmap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0067ac"/>
      <stop offset="100%" stop-color="#ea4b71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 배경 라인 -->
  <line x1="60" y1="180" x2="840" y2="180" stroke="#e3e8ef" stroke-width="3" stroke-dasharray="6 6"/>
  <line x1="60" y1="180" x2="840" y2="180" stroke="url(#grad-roadmap)" stroke-width="3" opacity="0.7"/>

  <!-- 단계 그룹 (3구간) -->
  <text x="170" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#0067ac" font-family="system-ui, sans-serif">PHASE 1 · 준비와 인증</text>
  <text x="450" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#7a3a8a" font-family="system-ui, sans-serif">PHASE 2 · 데이터 수집</text>
  <text x="730" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#ea4b71" font-family="system-ui, sans-serif">PHASE 3 · 분석과 알림</text>

  <line x1="60" y1="55" x2="280" y2="55" stroke="#0067ac" stroke-width="2" opacity="0.4"/>
  <line x1="320" y1="55" x2="580" y2="55" stroke="#7a3a8a" stroke-width="2" opacity="0.4"/>
  <line x1="620" y1="55" x2="840" y2="55" stroke="#ea4b71" stroke-width="2" opacity="0.4"/>

  <!-- 모듈 0~6 노드 -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- 모듈 0 -->
    <g filter="url(#shadow)">
      <circle cx="80" cy="180" r="32" fill="#fff" stroke="#0067ac" stroke-width="3"/>
      <text x="80" y="187" text-anchor="middle" font-size="20" font-weight="800" fill="#0067ac">0</text>
    </g>
    <text x="80" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">사전 준비</text>
    <text x="80" y="256" text-anchor="middle" font-size="11" fill="#5a6a7a">30분</text>

    <!-- 모듈 1 -->
    <g filter="url(#shadow)">
      <circle cx="200" cy="180" r="32" fill="#fff" stroke="#0067ac" stroke-width="3"/>
      <text x="200" y="187" text-anchor="middle" font-size="20" font-weight="800" fill="#0067ac">1</text>
    </g>
    <text x="200" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">API 신청·인증</text>
    <text x="200" y="256" text-anchor="middle" font-size="11" fill="#5a6a7a">45분</text>

    <!-- 모듈 2 -->
    <g filter="url(#shadow)">
      <circle cx="320" cy="180" r="32" fill="#fff" stroke="#3a6f9c" stroke-width="3"/>
      <text x="320" y="187" text-anchor="middle" font-size="20" font-weight="800" fill="#3a6f9c">2</text>
    </g>
    <text x="320" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">토큰 자동발급</text>
    <text x="320" y="256" text-anchor="middle" font-size="11" fill="#5a6a7a">45분</text>

    <!-- 모듈 3 -->
    <g filter="url(#shadow)">
      <circle cx="440" cy="180" r="32" fill="#fff" stroke="#7a3a8a" stroke-width="3"/>
      <text x="440" y="187" text-anchor="middle" font-size="20" font-weight="800" fill="#7a3a8a">3</text>
    </g>
    <text x="440" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">현재가 시세</text>
    <text x="440" y="256" text-anchor="middle" font-size="11" fill="#5a6a7a">60분</text>

    <!-- 모듈 4 -->
    <g filter="url(#shadow)">
      <circle cx="560" cy="180" r="32" fill="#fff" stroke="#a04777" stroke-width="3"/>
      <text x="560" y="187" text-anchor="middle" font-size="20" font-weight="800" fill="#a04777">4</text>
    </g>
    <text x="560" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">평균 거래량</text>
    <text x="560" y="256" text-anchor="middle" font-size="11" fill="#5a6a7a">60분</text>

    <!-- 모듈 5 -->
    <g filter="url(#shadow)">
      <circle cx="680" cy="180" r="32" fill="#fff" stroke="#c84566" stroke-width="3"/>
      <text x="680" y="187" text-anchor="middle" font-size="20" font-weight="800" fill="#c84566">5</text>
    </g>
    <text x="680" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">조건 분기</text>
    <text x="680" y="256" text-anchor="middle" font-size="11" fill="#5a6a7a">30분</text>

    <!-- 모듈 6 -->
    <g filter="url(#shadow)">
      <circle cx="820" cy="180" r="36" fill="url(#grad-roadmap)" stroke="#ea4b71" stroke-width="3"/>
      <text x="820" y="188" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">6</text>
    </g>
    <text x="820" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2332">알림 + 기록</text>
    <text x="820" y="256" text-anchor="middle" font-size="11" fill="#5a6a7a">60분</text>
  </g>

  <!-- 산출물 라벨 -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5a6a7a">
    <text x="80" y="135" text-anchor="middle">계정 4종</text>
    <text x="200" y="135" text-anchor="middle">App Key/Secret</text>
    <text x="320" y="135" text-anchor="middle">Access Token</text>
    <text x="440" y="135" text-anchor="middle">시세 JSON</text>
    <text x="560" y="135" text-anchor="middle">평균값</text>
    <text x="680" y="135" text-anchor="middle">조건 IF</text>
    <text x="820" y="135" text-anchor="middle" font-weight="700" fill="#ea4b71">완성!</text>
  </g>

  <!-- 하단 합계 -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="320" y="300" width="260" height="36" rx="18" fill="#f7f9fc" stroke="#e3e8ef"/>
    <text x="450" y="323" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2332">
      ⏱️ 총 학습시간 약 6시간 · 7개 모듈
    </text>
  </g>
</svg>
