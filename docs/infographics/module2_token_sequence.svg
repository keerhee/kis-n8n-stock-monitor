<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-label="n8n 토큰 자동발급 시퀀스">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0067ac"/>
    </marker>
    <marker id="arrh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6a7a"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1a2332">
    n8n 토큰 자동발급 시퀀스
  </text>

  <!-- 4 노드 -->
  <g font-family="system-ui">
    <!-- Schedule -->
    <rect x="40" y="80" width="160" height="80" rx="10" fill="#fff" stroke="#0067ac" stroke-width="2"/>
    <text x="120" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#0067ac">⏰ Schedule Trigger</text>
    <text x="120" y="128" text-anchor="middle" font-size="11" fill="#5a6a7a">매일 06:00 KST</text>
    <text x="120" y="144" text-anchor="middle" font-size="11" fill="#5a6a7a">cron: 0 6 * * *</text>

    <!-- HTTP Request -->
    <rect x="240" y="80" width="160" height="80" rx="10" fill="#fff" stroke="#0067ac" stroke-width="2"/>
    <text x="320" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#0067ac">🌐 HTTP Request</text>
    <text x="320" y="128" text-anchor="middle" font-size="11" fill="#5a6a7a">POST /oauth2/tokenP</text>
    <text x="320" y="144" text-anchor="middle" font-size="11" fill="#5a6a7a">grant_type, key, secret</text>

    <!-- Edit Fields -->
    <rect x="440" y="80" width="160" height="80" rx="10" fill="#fff" stroke="#3a6f9c" stroke-width="2"/>
    <text x="520" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#3a6f9c">✏️ Edit Fields (Set)</text>
    <text x="520" y="128" text-anchor="middle" font-size="11" fill="#5a6a7a">access_token 추출</text>
    <text x="520" y="144" text-anchor="middle" font-size="11" fill="#5a6a7a">expires_at 계산</text>

    <!-- Save -->
    <rect x="640" y="80" width="120" height="80" rx="10" fill="#fff" stroke="#ea4b71" stroke-width="2"/>
    <text x="700" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#ea4b71">💾 토큰 저장</text>
    <text x="700" y="128" text-anchor="middle" font-size="11" fill="#5a6a7a">Sheets / Static</text>
    <text x="700" y="144" text-anchor="middle" font-size="11" fill="#5a6a7a">Workflow Data</text>
  </g>

  <line x1="200" y1="120" x2="240" y2="120" stroke="#0067ac" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="400" y1="120" x2="440" y2="120" stroke="#0067ac" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="600" y1="120" x2="640" y2="120" stroke="#0067ac" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- 시퀀스 다이어그램 -->
  <g font-family="system-ui">
    <text x="100" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#5a6a7a">n8n</text>
    <text x="700" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#5a6a7a">한투 OAuth 서버</text>

    <line x1="100" y1="220" x2="100" y2="380" stroke="#c8d1dd" stroke-width="2" stroke-dasharray="3 3"/>
    <line x1="700" y1="220" x2="700" y2="380" stroke="#c8d1dd" stroke-width="2" stroke-dasharray="3 3"/>

    <line x1="100" y1="245" x2="700" y2="245" stroke="#5a6a7a" stroke-width="1.5" marker-end="url(#arrh)"/>
    <text x="400" y="240" text-anchor="middle" font-size="11" fill="#1a2332">POST { appkey, appsecret, grant_type:"client_credentials" }</text>

    <line x1="700" y1="280" x2="100" y2="280" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrh)"/>
    <text x="400" y="275" text-anchor="middle" font-size="11" fill="#047857">200 OK { access_token, expires_in: 86400 }</text>

    <line x1="100" y1="320" x2="100" y2="320" stroke="none"/>
    <rect x="80" y="305" width="40" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="100" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">저장</text>

    <line x1="100" y1="355" x2="700" y2="355" stroke="#ea4b71" stroke-width="1.5" marker-end="url(#arrh)"/>
    <text x="400" y="350" text-anchor="middle" font-size="11" fill="#ea4b71">이후 모든 API 호출에 Authorization: Bearer &lt;token&gt;</text>
  </g>
</svg>
