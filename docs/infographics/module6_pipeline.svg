<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-label="알림 파이프라인 전체 구조">
  <defs>
    <marker id="arr6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea4b71"/>
    </marker>
    <linearGradient id="finalg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0067ac"/>
      <stop offset="100%" stop-color="#ea4b71"/>
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1a2332">
    완성된 알림 파이프라인 — 모든 모듈의 결합
  </text>

  <!-- 좌측 입력 -->
  <g font-family="system-ui">
    <rect x="20" y="180" width="140" height="80" rx="10" fill="#fff" stroke="#0067ac" stroke-width="2"/>
    <text x="90" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#0067ac">⏰ Schedule</text>
    <text x="90" y="228" text-anchor="middle" font-size="11" fill="#5a6a7a">매 N분마다</text>
    <text x="90" y="244" text-anchor="middle" font-size="11" fill="#5a6a7a">관심 종목 모니터링</text>
  </g>

  <line x1="160" y1="220" x2="200" y2="220" stroke="#ea4b71" stroke-width="2" marker-end="url(#arr6)"/>

  <!-- 중앙 처리 -->
  <g font-family="system-ui">
    <rect x="200" y="100" width="240" height="240" rx="12" fill="#f7f9fc" stroke="#7a3a8a" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="320" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#7a3a8a">📦 모듈 1~5에서 만든 워크플로</text>

    <rect x="220" y="140" width="200" height="34" rx="6" fill="#fff" stroke="#0067ac"/>
    <text x="320" y="161" text-anchor="middle" font-size="11" fill="#1a2332">① 토큰 발급/재사용</text>

    <rect x="220" y="180" width="200" height="34" rx="6" fill="#fff" stroke="#0067ac"/>
    <text x="320" y="201" text-anchor="middle" font-size="11" fill="#1a2332">② 현재가 + 평균거래량 조회</text>

    <rect x="220" y="220" width="200" height="34" rx="6" fill="#fff" stroke="#7a3a8a"/>
    <text x="320" y="241" text-anchor="middle" font-size="11" fill="#1a2332">③ ratio 계산</text>

    <rect x="220" y="260" width="200" height="34" rx="6" fill="#fde7ed" stroke="#ea4b71"/>
    <text x="320" y="281" text-anchor="middle" font-size="11" font-weight="700" fill="#c84566">④ IF: ratio ≥ 2.0?</text>

    <text x="320" y="318" text-anchor="middle" font-size="10" fill="#5a6a7a">↓ TRUE 분기에서 양쪽으로 분배 ↓</text>
  </g>

  <!-- 출력으로 분기 -->
  <line x1="440" y1="280" x2="500" y2="180" stroke="#ea4b71" stroke-width="2" marker-end="url(#arr6)"/>
  <line x1="440" y1="280" x2="500" y2="280" stroke="#ea4b71" stroke-width="2" marker-end="url(#arr6)"/>
  <line x1="440" y1="280" x2="500" y2="380" stroke="#10b981" stroke-width="2" marker-end="url(#arr6)" stroke-dasharray="4 4"/>

  <!-- Discord -->
  <g font-family="system-ui">
    <rect x="500" y="135" width="280" height="90" rx="10" fill="#fff" stroke="#5865F2" stroke-width="2"/>
    <text x="640" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#5865F2">💬 Discord Webhook</text>
    <text x="640" y="180" text-anchor="middle" font-size="11" fill="#5a6a7a">📈 종목명 (코드)</text>
    <text x="640" y="196" text-anchor="middle" font-size="11" fill="#5a6a7a">현재가 / 평균거래량 N배</text>
    <text x="640" y="212" text-anchor="middle" font-size="11" fill="#5a6a7a">즉시 푸시 알림 (모바일)</text>
  </g>

  <!-- Google Sheets (always log) -->
  <g font-family="system-ui">
    <rect x="500" y="240" width="280" height="90" rx="10" fill="#fff" stroke="#0F9D58" stroke-width="2"/>
    <text x="640" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#0F9D58">📊 Google Sheets (이상)</text>
    <text x="640" y="285" text-anchor="middle" font-size="11" fill="#5a6a7a">알림 발송 시점만 기록</text>
    <text x="640" y="301" text-anchor="middle" font-size="11" fill="#5a6a7a">시각·종목·ratio·현재가</text>
    <text x="640" y="317" text-anchor="middle" font-size="11" fill="#5a6a7a">→ 백테스트 자료</text>
  </g>

  <!-- Sheets always -->
  <g font-family="system-ui">
    <rect x="500" y="345" width="280" height="60" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="640" y="368" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">📋 Sheets (정상 로그) · 옵션</text>
    <text x="640" y="388" text-anchor="middle" font-size="10" fill="#5a6a7a">전체 스냅샷 누적 (조용히 저장)</text>
  </g>

  <text x="400" y="425" text-anchor="middle" font-family="system-ui" font-size="12" fill="#5a6a7a">
    하나의 워크플로가 <tspan font-weight="700" fill="#ea4b71">알림</tspan>·<tspan font-weight="700" fill="#0F9D58">기록</tspan>·<tspan font-weight="700" fill="#10b981">아카이빙</tspan>을 동시에 처리합니다.
  </text>
</svg>
