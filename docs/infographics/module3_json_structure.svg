<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="현재가 시세 응답 구조">
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="700" fill="#1a2332">
    현재가 시세 API 응답 JSON 구조
  </text>

  <!-- 왼쪽: 요청 -->
  <g font-family="system-ui">
    <rect x="40" y="60" width="280" height="380" rx="12" fill="#f7f9fc" stroke="#e3e8ef"/>
    <text x="180" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#0067ac">📤 요청 (Request)</text>

    <text x="60" y="120" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a2332">GET /uapi/domestic-stock/v1/</text>
    <text x="60" y="138" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a2332">  quotations/inquire-price</text>

    <text x="60" y="170" font-size="11" font-weight="700" fill="#5a6a7a">Headers</text>
    <rect x="60" y="178" width="240" height="100" rx="6" fill="#fff" stroke="#e3e8ef"/>
    <text x="70" y="196" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#1a2332">authorization: Bearer ...</text>
    <text x="70" y="214" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#1a2332">appkey: PSxxxxxxxxxx</text>
    <text x="70" y="232" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#1a2332">appsecret: Sxxxxxxxxxx</text>
    <text x="70" y="250" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#ea4b71">tr_id: FHKST01010100</text>
    <text x="70" y="268" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#1a2332">custtype: P</text>

    <text x="60" y="300" font-size="11" font-weight="700" fill="#5a6a7a">Query Parameters</text>
    <rect x="60" y="308" width="240" height="60" rx="6" fill="#fff" stroke="#e3e8ef"/>
    <text x="70" y="328" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#1a2332">FID_COND_MRKT_DIV_CODE: J</text>
    <text x="70" y="346" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#1a2332">FID_INPUT_ISCD: 005930</text>
    <text x="70" y="362" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#5a6a7a">                 (삼성전자)</text>

    <text x="180" y="408" text-anchor="middle" font-size="10" fill="#5a6a7a">시장구분 J=KOSPI · 종목코드 6자리</text>
  </g>

  <!-- 화살표 -->
  <line x1="330" y1="240" x2="370" y2="240" stroke="#0067ac" stroke-width="3" marker-end="url(#arr3)"/>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0067ac"/>
    </marker>
  </defs>

  <!-- 오른쪽: 응답 -->
  <g font-family="system-ui">
    <rect x="380" y="60" width="380" height="380" rx="12" fill="#f7f9fc" stroke="#e3e8ef"/>
    <text x="570" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">📥 응답 (Response · output 객체)</text>

    <!-- JSON 트리 -->
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#1a2332">
      <text x="400" y="120">{</text>
      <text x="420" y="138" fill="#0067ac">"rt_cd"</text> <text x="475" y="138">: "0",</text>
      <text x="555" y="138" fill="#5a6a7a" font-size="10">// 성공</text>
      <text x="420" y="156" fill="#0067ac">"output"</text> <text x="485" y="156">: {</text>
    </g>

    <!-- output 필드들 -->
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <rect x="430" y="170" width="320" height="22" rx="4" fill="#e8f1f9"/>
      <text x="440" y="186" fill="#0067ac">"stck_prpr"</text>
      <text x="540" y="186" fill="#1a2332">: "75300"</text>
      <text x="640" y="186" fill="#5a6a7a" font-size="10">현재가</text>

      <rect x="430" y="196" width="320" height="22" rx="4" fill="#fde7ed"/>
      <text x="440" y="212" fill="#ea4b71">"acml_vol"</text>
      <text x="540" y="212" fill="#1a2332">: "12345678"</text>
      <text x="650" y="212" fill="#5a6a7a" font-size="10">누적거래량</text>

      <rect x="430" y="222" width="320" height="22" rx="4" fill="#fff"/>
      <text x="440" y="238" fill="#1a2332">"prdy_vrss"</text>
      <text x="540" y="238" fill="#1a2332">: "1500"</text>
      <text x="640" y="238" fill="#5a6a7a" font-size="10">전일대비</text>

      <rect x="430" y="248" width="320" height="22" rx="4" fill="#fff"/>
      <text x="440" y="264" fill="#1a2332">"prdy_ctrt"</text>
      <text x="540" y="264" fill="#1a2332">: "2.03"</text>
      <text x="640" y="264" fill="#5a6a7a" font-size="10">등락률 %</text>

      <rect x="430" y="274" width="320" height="22" rx="4" fill="#fff"/>
      <text x="440" y="290" fill="#1a2332">"stck_oprc"</text>
      <text x="540" y="290" fill="#1a2332">: "73900"</text>
      <text x="640" y="290" fill="#5a6a7a" font-size="10">시가</text>

      <rect x="430" y="300" width="320" height="22" rx="4" fill="#fff"/>
      <text x="440" y="316" fill="#1a2332">"stck_hgpr"</text>
      <text x="540" y="316" fill="#1a2332">: "75500"</text>
      <text x="640" y="316" fill="#5a6a7a" font-size="10">고가</text>

      <rect x="430" y="326" width="320" height="22" rx="4" fill="#fff"/>
      <text x="440" y="342" fill="#1a2332">"stck_lwpr"</text>
      <text x="540" y="342" fill="#1a2332">: "73800"</text>
      <text x="640" y="342" fill="#5a6a7a" font-size="10">저가</text>

      <text x="420" y="372" font-family="JetBrains Mono, monospace" font-size="11" fill="#5a6a7a">  ... (200+ 필드)</text>
      <text x="420" y="390" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a2332">  }</text>
      <text x="400" y="408" font-family="JetBrains Mono, monospace" font-size="11" fill="#1a2332">}</text>
    </g>

    <text x="570" y="430" text-anchor="middle" font-size="10" fill="#5a6a7a">파란색 = 가격 핵심필드 · 코랄색 = 거래량 (다음 모듈에서 사용)</text>
  </g>
</svg>
