<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JetBrains/JetBrainsMono@v2.304/web/css/jetbrains-mono.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230067ac'/%3E%3Ctext x='16' y='22' font-family='system-ui' font-size='15' font-weight='800' text-anchor='middle' fill='white'%3EK%3C/text%3E%3C/svg%3E">

  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
</head>
<body>
  {% include header.html %}

  <main class="content content-inner" style="max-width:var(--max-content); margin:0 auto; padding:48px 24px;">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/progress.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/copy.js' | relative_url }}"></script>
</body>
</html>
